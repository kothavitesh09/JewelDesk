{% extends "base.html" %}
{% block content %}
  <section class="billing-shell">
    <div class="billing-grid">
      <div class="billing-left-column">
        <div class="premium-card customer-card">
          <div class="section-heading">
            <div class="section-heading__icon">&#128100;</div>
            <div>
              <h2 class="section-title">Customer Details</h2>
            </div>
          </div>

          <div class="field-stack">
            <div class="mb-3">
              <label class="form-label premium-label" for="invoiceNoInput">Invoice No (optional)</label>
              <input
                type="text"
                id="invoiceNoInput"
                class="form-control premium-input"
                placeholder="Leave blank to auto-assign"
              />
            </div>

            <div class="mb-3">
              <label class="form-label premium-label" for="customerName">Customer Name</label>
              <input
                type="text"
                id="customerName"
                class="form-control premium-input"
                placeholder="Enter customer name"
              />
            </div>

            <div class="mb-4">
              <label class="form-label premium-label" for="partyGstNo">GST Number (optional)</label>
              <input
                type="text"
                id="partyGstNo"
                class="form-control premium-input"
                placeholder="Enter GSTIN if available"
              />
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label premium-label d-block">Mode of Payment</label>
            <div class="tax-pill-group" id="paymentModeGroup">
              <label class="tax-pill" for="paymentModeCash">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="paymentModeCash"
                  checked
                />
                <span>Cash</span>
              </label>
              <label class="tax-pill tax-pill--light" for="paymentModeBank">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="paymentModeBank"
                />
                <span>Bank</span>
              </label>
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label premium-label d-block">Tax Type</label>
            <div class="tax-pill-group">
              <label class="tax-pill" for="taxTypeCgstSgst">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="taxTypeCgstSgst"
                  checked
                />
                <span>CGST + SGST</span>
              </label>
              <label class="tax-pill tax-pill--light" for="taxTypeIgst">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="taxTypeIgst"
                />
                <span>IGST</span>
              </label>
            </div>
          </div>

          <div class="action-row">
            <button class="btn btn-premium-secondary" id="addItemBtn" type="button">+ Add Item</button>
            <button class="btn btn-premium-primary" id="generateBillBtn" type="button">Generate Bill</button>
            <button class="btn btn-premium-accent" id="editBillBtn" type="button" disabled>Edit</button>
            <button class="btn btn-premium-primary" id="updateBillBtn" type="button" style="display:none;">Update</button>
            <button class="btn btn-premium-secondary" id="cancelEditBtn" type="button" style="display:none;">Cancel</button>
            <button class="btn btn-premium-secondary" id="downloadPdfBtn" type="button" disabled>Download PDF</button>
            <button class="btn btn-premium-secondary" id="printBillBtn" type="button" disabled>Print Bill</button>
          </div>
        </div>
      </div>

      <div class="billing-right-column">
        <div class="premium-card items-card">
          <div class="section-heading section-heading--compact">
            <h2 class="section-title">Invoice Items</h2>
          </div>

          <div class="table-responsive premium-table-wrap">
            <table class="table premium-table align-middle" id="itemsTable">
              <thead>
                <tr>
                  <th style="width: 82px; text-align: center;">S. No</th>
                  <th>Particulars</th>
                  <th style="width: 150px;">HSN Code</th>
                  <th style="width: 150px;">Qty in Gms</th>
                  <th style="width: 170px;">Amount (Rs, Ps)</th>
                  <th style="width: 150px;">Rate per Gms</th>
                  <th style="width: 68px; text-align: center;"> </th>
                </tr>
              </thead>
              <tbody id="itemsTbody"></tbody>
            </table>
          </div>
        </div>

        <div class="premium-card summary-card">
          <div class="section-heading section-heading--compact section-heading--summary">
            <h2 class="section-title">Bill Summary</h2>
          </div>

          <div class="summary-panel">
            <div class="summary-row summary-row--invoice">
              <span class="summary-label">Invoice No</span>
              <span class="summary-value" id="invoiceNoText">Not generated</span>
            </div>

            <div class="summary-divider"></div>

            <div class="summary-grid">
              <div class="summary-row">
                <span class="summary-label">Total</span>
                <span class="summary-value">Rs <span id="totalText">0.00</span></span>
              </div>
              <div class="summary-row">
                <span class="summary-label">CGST (1.5%)</span>
                <span class="summary-value">Rs <span id="cgstText">0.00</span></span>
              </div>
              <div class="summary-row">
                <span class="summary-label">SGST (1.5%)</span>
                <span class="summary-value">Rs <span id="sgstText">0.00</span></span>
              </div>
              <div class="summary-row">
                <span class="summary-label">IGST (3%)</span>
                <span class="summary-value">Rs <span id="igstText">0.00</span></span>
              </div>
            </div>

            <div class="summary-divider"></div>

            <div class="summary-row summary-row--total">
              <span class="summary-label">Invoice Total</span>
              <span class="summary-value">Rs <span id="invoiceTotalText">0.00</span></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    window.__BILLING_INIT__ = { empty: true };
  </script>
  <script src="{{ url_for('static', filename='js/billing.js', v='20260326a') }}"></script>
{% endblock %}
