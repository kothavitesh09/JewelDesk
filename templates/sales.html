{% extends "base.html" %}
{% block content %}
  <section class="reports-list-shell">
    <div class="reports-list-grid">
      <aside class="premium-card reports-filter-card">
        <div class="reports-filter-card__header">
          <h1 class="reports-filter-card__title">Reports</h1>
        </div>

        <div class="reports-filter-form">
          <div class="reports-filter-field">
            <label for="salesFromDate">From Date</label>
            <input type="date" id="salesFromDate" class="form-control premium-input" />
          </div>

          <div class="reports-filter-field">
            <label for="salesToDate">To Date</label>
            <input type="date" id="salesToDate" class="form-control premium-input" />
          </div>

          <div class="reports-filter-actions">
            <button type="button" class="btn btn-premium-primary" id="showInvoicesBtn">Show Invoices</button>
            <button type="button" class="btn btn-premium-secondary" id="downloadExcelBtn">Download Excel</button>
          </div>

          <p class="reports-filter-note" id="reportsCountText">0 invoices found.</p>
        </div>
      </aside>

      <div class="premium-card reports-list-card">
        <div class="reports-list-card__header">
          <h2 class="reports-list-card__title">Invoice List</h2>
          <div class="reports-list-summary">
            <span>Total Invoices: <strong id="summaryInvoicesValue">0</strong></span>
            <span>Total Amount: <strong id="summaryAmountValue">Rs 0</strong></span>
          </div>
        </div>

        <div class="reports-list-loading" id="salesReportsLoading">
          <div class="skeleton-line"></div>
          <div class="skeleton-line"></div>
        </div>

        <div class="reports-month-groups" id="salesReportGroups"></div>
        <div class="reports-empty-state" id="salesReportsEmptyState">No invoices found for the selected dates.</div>
      </div>
    </div>
  </section>

  <script src="{{ url_for('static', filename='js/sales.js', v='20260402b') }}"></script>
{% endblock %}
