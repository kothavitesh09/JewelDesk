{% extends "base.html" %}
{% block title %}Admin Login | JewelDesk{% endblock %}
{% block content %}
  <section class="auth-shell">
    <div class="auth-card">
      <span class="page-eyebrow">Admin Access</span>
      <h1 class="page-title">Approval Panel Login</h1>
      <p class="page-copy">Approve or reject new shops and review the active tenant list from one secure panel.</p>
      {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
      <form method="post" class="auth-form">
        <div>
          <label class="form-label premium-label">Username</label>
          <input class="form-control premium-input" name="username" value="{{ username or '' }}" required />
        </div>
        <div>
          <label class="form-label premium-label">Password</label>
          <input type="password" class="form-control premium-input" name="password" required />
        </div>
        <button type="submit" class="btn btn-premium-primary w-100">Login As Admin</button>
      </form>
      <div class="auth-footer-links">
        <a href="/login" class="auth-link">User Login</a>
      </div>
    </div>
  </section>
{% endblock %}
