<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JewelDesk</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="{{ url_for('static', filename='css/styles.css', v='20260324a') }}" rel="stylesheet" />
  </head>
  <body>
    <!-- Minimal top bar with brand and right tabs -->
    <div class="top-bar">
      <div class="brand-section">
        <img src="{{ url_for('static', filename='images/jeweldesk-logo.png') }}" alt="JewelDesk" class="brand-logo" />
        <span class="brand-name">JewelDesk</span>
      </div>
      <div class="nav-tabs-right">
        <a href="/billing" class="tab-link {% if request.endpoint in ['billing_page','root'] %}active{% endif %}">Billing</a>
        <a href="/reports" class="tab-link {% if request.endpoint == 'reports_page' %}active{% endif %}">Reports</a>
      </div>
    </div>

    <main class="container py-4">
      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
