{% extends "base.html" %}
{% block title %}Login | JewelDesk{% endblock %}
{% block content %}
  <section class="auth-shell">
    <div class="auth-card">
      <span class="page-eyebrow">Secure Login</span>
      <h1 class="page-title">Sign In</h1>
      <p class="page-copy">Only approved accounts can access billing, inventory, reports, and PDF generation.</p>
      {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
      <form method="post" class="auth-form">
        <div>
          <label class="form-label premium-label">Email</label>
          <input type="email" class="form-control premium-input" name="email" value="{{ email or '' }}" required />
        </div>
        <div>
          <label class="form-label premium-label">Password</label>
          <input type="password" class="form-control premium-input" name="password" required />
        </div>
        <button type="submit" class="btn btn-premium-primary w-100">Login</button>
      </form>
      <div class="auth-footer-links">
        <a href="/create-account" class="auth-link">Create Account</a>
        <a href="/admin/login" class="auth-link">Admin Panel</a>
      </div>
    </div>
  </section>
{% endblock %}
